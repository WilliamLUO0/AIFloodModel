# general settings
name: 025_FMPFT_SRx8_inba_l1_bce
model_type: FMSRModel
scale: 16
num_gpu: 1
manual_seed: 61

# dataset and data loader settings
datasets:
  val_1:
    name: FloodMapSR-Val-h
    type: PairedFloodMapDataset
    dataroot: /nesi/nobackup/uoa04425/zluo784/Exp1/AIFloodModel/dataset_ds8
    index_csv: /nesi/nobackup/uoa04425/zluo784/Exp1/AIFloodModel/dataset_ds8/index_with_interval_stats_h.csv
    io_backend:
      type: disk

    phase: val
    target_var: h
    aux_vars: [zs, dem]
    scale: 8
    patch_fine: 512
    patch_coarse: 64

    split_cfg:
      by: scenario
      val_ratio: 0.2
      seed: 61
      split_stats_json: /nesi/nobackup/uoa04425/zluo784/Exp1/AIFloodModel/dataset_ds8/split_stats_h_asinh_wet.json
    stats:
      calculate_if_missing: false
      use_clip_coarse: false
      use_clip_static: false
      norm: zscore
      transform: asinh
      h_asinh_q: 90

# network structures
network_g:
  type: FloodMapPFTV4
  upscale: 8
  coarse_in_chans: 3
  static_in_chans: 7
  flood_map_size: 64
  use_shallow_act: true
  use_aoi_gate: true
  aoi_alpha: 0.8
  couple_mode: none
  couple_eps: 0.2
  embed_dim: 240
  depths: [4, 4, 4, 6, 6, 6]
  num_heads: 6
  num_topk: [ 1024, 1024, 1024, 1024,
              256, 256, 256, 256,
              128, 128, 128, 128,
              64, 64, 64, 64, 64, 64,
              32, 32, 32, 32, 32, 32,
              16, 16, 16, 16, 16, 16,]
  window_size: 32
  convffn_kernel_size: 7
  mlp_ratio: 2.
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'
  use_checkpoint: false

# path
path:
  pretrain_network_g: experiments/025_FMPFT_SRx8_inba_l1_bce/models/net_g_260000.pth
  strict_load_g: yes
  param_key_g: params_ema

# validation settings
val:
  save_flood_map: true
  suffix: ~

  metrics:
    rmse:
      type: cal_rmse_pt
      reduction: mean
      better: lower
    rmse_thr:
      type: cal_rmse_threshold_pt
      reduction: mean
      threshold: 0.1
      better: lower
    rmse_thr_tol:
      type: cal_rmse_threshold_tolerant_pt
      reduction: mean
      threshold: 0.1
      abs_tol: 0.02
      better: lower
    rmse_all:
      type: cal_rmse_conditional_pt
      reduction: none
      cond_on_target_ge: ~
      better: lower
    rmse_nonflood01:
      type: cal_rmse_conditional_pt
      reduction: none
      cond_on_target_ge: 0.0
      cond_on_target_lt: 0.1
      better: lower
    rmse_nonflood01_tol:
