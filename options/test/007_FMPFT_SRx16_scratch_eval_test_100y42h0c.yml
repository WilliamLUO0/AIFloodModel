# general settings
name: 007_FMPFT_SRx16_scratch_eval_test_100y42h0c
model_type: FMSRModel
scale: 16
num_gpu: 1
manual_seed: 61

# dataset and data loader settings
datasets:
  test_1:
    name: FloodMapSR-Test-100y42h0c-h
    type: PairedFloodMapDataset
    dataroot: /nesi/nobackup/uoa04425/zluo784/Exp1/AIFloodModel/testdataset_100y42h0c
    index_csv: /nesi/nobackup/uoa04425/zluo784/Exp1/AIFloodModel/testdataset_100y42h0c/index.csv
    io_backend:
      type: disk

    phase: test
    target_var: h
    scale: 16
    patch_fine: 1024
    patch_coarse: 64

    split_cfg:
      by: scenario
      val_ratio: 0.2
      seed: 61
      split_stats_json: /nesi/nobackup/uoa04425/zluo784/Exp1/AIFloodModel/dataset/split_stats_h_noclip_simu.json
    stats:
      calculate_if_missing: false
      use_clip_coarse: false
      use_clip_static: true

# network structures
network_g:
  type: FloodMapPFTOLD
  upscale: 16
  coarse_in_chans: 1
  static_in_chans: 7
  flood_map_size: 64
  use_shallow_act: true
  use_aoi_gate: true
  aoi_alpha: 0.8
  embed_dim: 240
  depths: [4, 4, 4, 6, 6, 6]
  num_heads: 6
  num_topk: [ 1024, 1024, 1024, 1024,
              256, 256, 256, 256,
              128, 128, 128, 128,
              64, 64, 64, 64, 64, 64,
              32, 32, 32, 32, 32, 32,
              16, 16, 16, 16, 16, 16,]
  window_size: 32
  convffn_kernel_size: 7
  mlp_ratio: 2.
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'
  use_checkpoint: false

# path
path:
  pretrain_network_g: experiments/007_FMPFT_SRx16_scratch/models/net_g_1000000.pth
  strict_load_g: yes
  param_key_g: params_ema

# validation settings
val:
  save_flood_map: true
  suffix: ~

  metrics:
    rmse:
      type: cal_rmse_pt
      reduction: mean
      better: lower
    rmse_thr:
      type: cal_rmse_depth_threshold_pt
      better: lower
    rmse_thr_tol:
      type: cal_rmse_depth_threshold_tolerant_pt
      better: lower
    nse:
      type: cal_nse_pt
      reduction: mean
      better: higher
    nse_thr:
      type: cal_nse_depth_threshold_pt
      reduction: mean
      better: higher
    nse_thr_tol:
      type: cal_nse_depth_threshold_tolerant_pt
      reduction: mean
      better: higher
    nse_safe:
      type: cal_nse_pt_safe
      reduction: mean
      min_var: 1.0e-6
      abs_tol_per_px: 1.0e-4
      lower_bound: -5.0
      better: higher
    nse_thr_safe:
      type: cal_nse_depth_threshold_pt_safe
      better: higher
    nse_thr_tol_safe:
      type: cal_nse_depth_threshold_tolerant_pt_safe
      better: higher
    csi:
      type: cal_csi_pt
      threshold: 0.05
      reduction: mean
      better: higher
    csi_tol:
      type: cal_csi_depth_tolerant_pt
      better: higher
    precision:
      type: cal_precision_pt
      threshold: 0.05
      reduction: mean
      better: higher
    precision_tol:
      type: cal_precision_depth_tolerant_pt
      better: higher
    recall:
      type: cal_recall_pt
      threshold: 0.05
      reduction: mean
      better: higher
    recell_tol:
      type: cal_recall_depth_tolerant_pt
      better: higher
    target_prevalence:
      type: cal_prev_t_pt
      threshold: 0.05
      reduction: mean
    pred_prevalence:
      type: cal_prev_p_pt
      threshold: 0.05
      reduction: mean
